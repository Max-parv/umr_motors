{% extends "base.html" %} {% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-search text-warning" style="font-size: 50px"></i>
            <h3 class="mt-3">Track Your Booking</h3>
            <p class="text-muted">
              Enter your mobile number or vehicle registration number
            </p>
          </div>

          {% if messages %} {% for message in messages %}
          <div class="alert alert-danger text-center">{{ message }}</div>
          {% endfor %} {% endif %}

          <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
              <input
                type="text"
                name="query"
                class="form-control form-control-lg text-center"
                placeholder="Enter Mobile or Registration Number"
                required
              />
            </div>

            <button type="submit" class="btn btn-dark w-100 btn-lg">
              Search Booking
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
